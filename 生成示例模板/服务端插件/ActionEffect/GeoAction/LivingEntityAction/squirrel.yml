squirrel:
  entityIdentifier: netease:squirrel
  geometry:
  - key: default
    name: geometry.squirrel
  texture:
  - key: default
    name: textures/entity/monster/squirrel
  render:
  - controller: controller.render.entity_default.third_person
    condition: ''
  animate:
  - key: idle
    name: animation.squirrel.idle
  - key: walk
    name: animation.squirrel.walk
  animate_controller:
  - key: default
    name: controller.animation.entity_idle_walk.default
  # entity_profile 是服务端默认 profile。
  # MythicMobs 显式传参时会优先覆盖这里，例如：
  # peba_injectionConfig{id=squirrel;hbv=false;bbv=true;chc=20;force=true;w=1.2;h=1.0;s=1.0}
  # 如果技能里没有显式写某个字段，则回退到这里的默认值。
  entity_profile:
    healthBarVisible: true
    bossBarVisible: false
    currentHealthCount: 10000
    force: true
    width: 1.2
    height: 1.0
    scale: 1.0
    title:
      text: "松鼠"
      textColor: "1.0,0.9,0.6,1.0"
      backgroundColor: "0.0,0.0,0.0,0.35"
      offset: "0.0,0.2,0.0"
      rotation: "0.0,0.0,0.0"
      scale: "1.0,1.0"
      depthTest: true
